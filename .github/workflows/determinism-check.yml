name: Determinism Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # Phase 1: Output determinism — no LLM required.
  # Runs on every push/PR and is the CI gate for NFR6 compliance.
  # ---------------------------------------------------------------
  output-determinism:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CUE
        run: |
          curl -L https://github.com/cue-lang/cue/releases/download/v0.11.1/cue_v0.11.1_linux_amd64.tar.gz | \
            sudo tar xz -C /usr/local/bin cue

      - name: Install Python dependencies
        run: |
          pip install -r eval/dfah/requirements.txt
          pip install -r eval/mcp-eval/requirements.txt

      - name: Build gemara-mcp image
        run: |
          docker build -t ghcr.io/gemaraproj/gemara-mcp:v0.1.0 \
            reference/gemara-mcp/

      - name: Validate corpus
        run: make corpus-validate

      - name: Run Phase 1 evaluations
        env:
          GEMARA_MCP_IMAGE: ghcr.io/gemaraproj/gemara-mcp:v0.1.0
          CONTAINER_RUNTIME: docker
        run: make eval-phase1

      - name: Generate Phase 1 NFR6 report
        run: make report-phase1

      - name: Upload Phase 1 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase1-results
          path: results/

      - name: Check NFR6 threshold (Phase 1)
        run: |
          python -c "
          import json, sys
          with open('results/nfr6-phase1-report.json') as f:
              report = json.load(f)
          verdict = report['nfr6_report']['nfr6_verdict']
          score = report['nfr6_report']['overall_determinism_score']
          print(f'NFR6 Phase 1: {verdict} (score: {score:.1%})')
          for a in report['per_tool_assessments']:
              s = a['determinism_score']
              s_str = f\"{s:.1%}\" if s is not None else 'N/A'
              print(f\"  {a['tool']}: {s_str} ({a['nfr6_contribution'].upper()})\")
          sys.exit(0 if verdict == 'PASS' else 1)
          "
