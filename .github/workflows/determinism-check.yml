name: "NFR6 — Output Determinism (Phase 1)"

# This is the NFR6 compliance gate.
# Runs on every push and PR. Exits 1 if the 90% determinism threshold is not met.
# No LLM, no Ollama, no Node.js required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  output-determinism:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CUE
        run: |
          curl -L https://github.com/cue-lang/cue/releases/download/v0.11.1/cue_v0.11.1_linux_amd64.tar.gz | \
            sudo tar xz -C /usr/local/bin cue

      - name: Install Python dependencies
        run: |
          pip install -r eval/dfah/requirements.txt
          pip install -r eval/mcp-eval/requirements.txt

      - name: Build gemara-mcp image
        run: |
          docker build -t ghcr.io/gemaraproj/gemara-mcp:v0.1.0 \
            reference/gemara-mcp/

      - name: Validate corpus
        run: make corpus-validate

      # --- Per-harness steps — both always run and upload independently
      #     so a partial failure still produces usable results.

      - name: "Harness: dfah"
        if: always()
        continue-on-error: true
        id: dfah
        env:
          GEMARA_MCP_IMAGE: ghcr.io/gemaraproj/gemara-mcp:v0.1.0
          CONTAINER_RUNTIME: docker
        run: make eval-dfah

      - name: Upload dfah results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-dfah
          path: results/dfah.json
          if-no-files-found: warn

      - name: "Harness: mcp-eval"
        if: always()
        continue-on-error: true
        id: mcp-eval
        env:
          GEMARA_MCP_IMAGE: ghcr.io/gemaraproj/gemara-mcp:v0.1.0
          CONTAINER_RUNTIME: docker
        run: make eval-mcp-eval

      - name: Upload mcp-eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-mcp-eval
          path: results/mcp-eval.json
          if-no-files-found: warn

      - name: Print Phase 1 harness summary
        if: always()
        run: |
          echo "| Harness  | Outcome |"
          echo "|----------|---------|"
          echo "| dfah     | ${{ steps.dfah.outcome }} |"
          echo "| mcp-eval | ${{ steps['mcp-eval'].outcome }} |"

      - name: Generate Phase 1 NFR6 report
        if: always()
        run: make report-phase1

      - name: Upload Phase 1 NFR6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-report
          path: results/nfr6-phase1-report.json
          if-no-files-found: warn

      - name: Check NFR6 threshold
        run: |
          python -c "
          import json, sys
          with open('results/nfr6-phase1-report.json') as f:
              report = json.load(f)
          verdict = report['nfr6_report']['nfr6_verdict']
          score = report['nfr6_report']['overall_determinism_score']
          print(f'NFR6 Phase 1: {verdict} (score: {score:.1%})')
          for a in report['per_tool_assessments']:
              s = a['determinism_score']
              s_str = f\"{s:.1%}\" if s is not None else 'N/A'
              print(f\"  {a['tool']}: {s_str} ({a['nfr6_contribution'].upper()})\")
          sys.exit(0 if verdict == 'PASS' else 1)
          "
