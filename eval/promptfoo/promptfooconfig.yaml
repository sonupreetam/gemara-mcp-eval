description: "gemara-mcp determinism evaluation suite (NFR6)"

prompts:
  - id: validate-artifact
    raw: |
      Validate the following YAML artifact against the Gemara {{definition}} schema.
      Return the validation result as JSON with fields: valid (boolean), errors (array), message (string).

      Artifact content:
      ```yaml
      {{artifact_content}}
      ```

providers:
  # Auto-selected based on environment variables.
  # Set LLM_PROVIDER=vertex_ai or LLM_PROVIDER=openai to switch.
  # Ollama is the default when running locally.
  - id: "ollama:chat:qwen2.5:7b"
    config:
      temperature: 0
    timeout: 180000

  # Uncomment to use Vertex AI (requires VERTEX_PROJECT, VERTEX_LOCATION):
  # - id: vertex:gemini-2.0-flash
  #   config:
  #     temperature: 0
  #   timeout: 180000

  # Uncomment to use OpenAI (requires OPENAI_API_KEY):
  # - id: openai:gpt-4o-mini
  #   config:
  #     temperature: 0
  #   timeout: 180000

defaultTest:
  options:
    runSerially: true
    timeout: 180000

tests:
  # --- Dimension 1: validate_gemara_artifact ---

  - description: "tc-001: Valid ControlCatalog passes validation"
    vars:
      definition: "#ControlCatalog"
      artifact_content: "file://../../corpus/inputs/tc-001-valid-control-catalog.yaml"
    assert:
      - type: contains
        value: "valid"
      - type: contains
        value: "true"

  - description: "tc-002: Missing group causes validation failure"
    vars:
      definition: "#ControlCatalog"
      artifact_content: "file://../../corpus/inputs/tc-002-invalid-missing-group.yaml"
    assert:
      - type: contains
        value: "false"
      - type: icontains
        value: "group"

  - description: "tc-003: Valid ThreatCatalog passes validation"
    vars:
      definition: "#ThreatCatalog"
      artifact_content: "file://../../corpus/inputs/tc-003-valid-threat-catalog.yaml"
    assert:
      - type: contains
        value: "valid"
      - type: contains
        value: "true"

  - description: "tc-004: Wrong metadata type fails ThreatCatalog validation"
    vars:
      definition: "#ThreatCatalog"
      artifact_content: "file://../../corpus/inputs/tc-004-invalid-wrong-type.yaml"
    assert:
      - type: contains
        value: "false"

  # NOTE: Threat assessment and control catalog generation tests are disabled
  # for local 7B models (too slow). Enable with a cloud-hosted model by
  # uncommenting the full test suite in promptfooconfig-full.yaml.

outputPath: ../../results/promptfoo.json
