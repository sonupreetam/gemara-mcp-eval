scenarios:
  # ===== Dimension 1: validate_gemara_artifact (Tool) =====

  - id: "tc-001"
    name: "Validate valid Layer 2 ControlCatalog"
    target: "validate_gemara_artifact"
    type: "tool"
    input_file: "inputs/tc-001-valid-control-catalog.yaml"
    tool_params:
      definition: "#ControlCatalog"
    expected:
      result: "valid"
      golden_file: "golden/tc-001-expected.json"
    determinism:
      runs: 20
      match_type: "exact"
      threshold: 1.0

  - id: "tc-002"
    name: "Validate ControlCatalog missing required group"
    target: "validate_gemara_artifact"
    type: "tool"
    input_file: "inputs/tc-002-invalid-missing-group.yaml"
    tool_params:
      definition: "#ControlCatalog"
    expected:
      result: "invalid"
      golden_file: "golden/tc-002-expected.json"
    determinism:
      runs: 20
      match_type: "exact"
      threshold: 1.0

  - id: "tc-003"
    name: "Validate valid Layer 2 ThreatCatalog"
    target: "validate_gemara_artifact"
    type: "tool"
    input_file: "inputs/tc-003-valid-threat-catalog.yaml"
    tool_params:
      definition: "#ThreatCatalog"
    expected:
      result: "valid"
      golden_file: "golden/tc-003-expected.json"
    determinism:
      runs: 20
      match_type: "exact"
      threshold: 1.0

  - id: "tc-004"
    name: "Validate ThreatCatalog with wrong metadata type"
    target: "validate_gemara_artifact"
    type: "tool"
    input_file: "inputs/tc-004-invalid-wrong-type.yaml"
    tool_params:
      definition: "#ThreatCatalog"
    expected:
      result: "invalid"
      golden_file: "golden/tc-004-expected.json"
    determinism:
      runs: 20
      match_type: "exact"
      threshold: 1.0

  - id: "tc-005"
    name: "Validate empty artifact content"
    target: "validate_gemara_artifact"
    type: "tool"
    input_file: "inputs/tc-005-empty.yaml"
    tool_params:
      definition: "#ControlCatalog"
    expected:
      result: "invalid"
      golden_file: "golden/tc-005-expected.json"
    determinism:
      runs: 20
      match_type: "exact"
      threshold: 1.0

  # ===== Dimension 2: threat_assessment (Prompt) =====

  - id: "tc-010"
    name: "Threat assessment for Kubernetes multi-tenant PII system"
    target: "threat_assessment"
    type: "prompt"
    prompt_params:
      COMPONENT: "Multi-tenant Kubernetes PII Processing Platform"
      ID_PREFIX: "K8S-PII"
    prompt_template: "prompts/create-threat-catalog.txt"
    expected:
      threats_must_include:
        - "data exfiltration"
        - "tenant isolation breach"
        - "unauthorized access"
      artifact_type: "ThreatCatalog"
      golden_file: "golden/tc-010-expected.yaml"
    determinism:
      runs: 20
      match_type: "jaccard"
      threshold: 0.8

  - id: "tc-011"
    name: "Threat assessment for CI/CD pipeline with unsigned images"
    target: "threat_assessment"
    type: "prompt"
    prompt_params:
      COMPONENT: "CI/CD Pipeline with Container Registry"
      ID_PREFIX: "CICD"
    prompt_template: "prompts/create-threat-catalog.txt"
    expected:
